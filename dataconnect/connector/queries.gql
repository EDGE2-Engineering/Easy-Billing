query ListJobs($type: String) @auth(level: USER, insecureReason: "Job list access.") {
  jobs(where: { type: { eq: $type } }) {
    id
    type
    status
    jobOrderNo
    clientId
    clientName
    projectName
    poWoNumber
    materialInward
    labTestResults
    chemicalAnalysis
    grainSizeAnalysis
    content
    createdAt
    updatedAt
    createdBy
    updatedBy
  }
}

