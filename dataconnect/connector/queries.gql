
# Queries for all entities

query ListUsers @auth(level: USER, insecureReason: "Discovery of users by any authenticated clerk.") {
  users {
    id
    username
    fullName
    role
    department
    isActive
    type
    createdAt
    updatedAt
    createdBy
  }
}

query GetUser($id: String!) @auth(level: USER, insecureReason: "User lookup by any authenticated clerk.") {
  user(id: $id) {
    id
    username
    fullName
    role
    department
    isActive
    type
    createdAt
    updatedAt
    createdBy
  }
}

