# Mutations for all entities

mutation UpsertUser(
  $id: String!,
  $username: String,
  $fullName: String,
  $role: String,
  $department: String,
  $isActive: Boolean,
  $type: String,
  $createdAt: String,
  $updatedAt: String,
  $createdBy: String
) @auth(level: USER, insecureReason: "Record management by any authenticated user for this demo.") {
  user_upsert(data: {
    id: $id,
    username: $username,
    fullName: $fullName,
    role: $role,
    department: $department,
    isActive: $isActive,
    type: $type,
    createdAt: $createdAt,
    updatedAt: $updatedAt,
    createdBy: $createdBy
  })
}

mutation DeleteUser($id: String!) @auth(level: USER, insecureReason: "Record deletion by any authenticated user for this demo.") {
  user_delete(id: $id)
}

